name: Build GLFW for Windows ARM64

on:
  workflow_dispatch:
    inputs:
      glfw_version:
        description: 'GLFW version tag (e.g. 3.4, 3.3.10)'
        required: true
        default: '3.4'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone GLFW
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.glfw_version }} https://github.com/glfw/glfw.git glfw-src

      - name: Configure shared library (cross-compile ARM64)
        run: |
          cmake -S glfw-src -B build-shared `
            -A ARM64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DGLFW_BUILD_EXAMPLES=OFF `
            -DGLFW_BUILD_TESTS=OFF `
            -DGLFW_BUILD_DOCS=OFF

      - name: Build shared
        run: cmake --build build-shared --config Release

      - name: Configure static library (cross-compile ARM64)
        run: |
          cmake -S glfw-src -B build-static `
            -A ARM64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DGLFW_BUILD_EXAMPLES=OFF `
            -DGLFW_BUILD_TESTS=OFF `
            -DGLFW_BUILD_DOCS=OFF

      - name: Build static
        run: cmake --build build-static --config Release

      - name: Copy artifacts into repo
        run: |
          # Clean previous build output
          if (Test-Path lib) { Remove-Item -Recurse -Force lib }
          if (Test-Path include\GLFW) { Remove-Item -Recurse -Force include\GLFW }

          mkdir lib
          mkdir -p include

          # Shared libs
          Copy-Item build-shared\src\Release\glfw3.dll lib\ -ErrorAction SilentlyContinue
          Copy-Item build-shared\src\Release\glfw3dll.lib lib\ -ErrorAction SilentlyContinue

          # Static lib
          Copy-Item build-static\src\Release\glfw3.lib lib\ -ErrorAction SilentlyContinue

          # Headers
          Copy-Item -Recurse glfw-src\include\GLFW include\GLFW

          Get-ChildItem -Recurse lib\
          Get-ChildItem -Recurse include\

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/ include/
          git commit -m "Build GLFW ${{ github.event.inputs.glfw_version }} for Windows ARM64"
          git push
